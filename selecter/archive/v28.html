<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GeoJSON Viewer</title>
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.16.0/dist/maplibre-gl.css' />
    <script src='https://unpkg.com/maplibre-gl@5.16.0/dist/maplibre-gl.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f11;
            --surface: #1a1a1f;
            --surface2: #22222a;
            --border: #2e2e38;
            --accent: #6ee7b7;
            --red: #ff4d6d;
            --magenta: #e040fb;
            --yellow: #fbbf24;
            --text: #e8e8f0;
            --text-muted: #9a9ab0;
            --text-dim: #b8b8cc;
            --mono: 'DM Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        body { margin: 0; padding: 0; background: var(--bg); font-family: var(--sans); color: var(--text); }
        html, body, #map { height: 100%; }

        /* ── SIDEBAR ── */
        #sidebar {
            position: absolute;
            top: 12px; left: 12px;
            /* bottom is set dynamically by JS after bar renders */
            width: 290px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        #sidebar-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #sidebar-header-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px;
        }

        #sidebar-header h2 {
            font-size: 13px; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--accent);
        }

        #sidebar-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }

        /* Sort buttons — now 3 options, slightly smaller text */
        #sort-controls { display: flex; gap: 4px; }
        .sort-btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text-muted); font-family: var(--sans); font-size: 10px;
            padding: 3px 7px; border-radius: 4px; cursor: pointer; transition: all 0.15s;
            white-space: nowrap;
        }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.08); }
        .sort-btn:hover:not(.active) { color: var(--text); border-color: var(--text-muted); }

        /* Search */
        #prop-search-wrap { position: relative; margin-bottom: 8px; }
        #prop-search {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); font-family: var(--mono); font-size: 12px;
            padding: 6px 10px 6px 28px; border-radius: 6px; outline: none;
            transition: border-color 0.15s;
        }
        #prop-search:focus { border-color: var(--accent); }
        #prop-search::placeholder { color: var(--text-muted); }
        #prop-search-icon {
            position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
            font-size: 11px; color: var(--text-muted); pointer-events: none;
        }

        /* Label hint row — always visible below search, above prop list */
        #label-hint {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 2px 5px;
            font-size: 11px; color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            min-height: 28px;
        }
        #label-hint-icon { font-size: 12px; flex-shrink: 0; }
        #label-hint-text { color: var(--text-muted); flex-shrink: 0; }
        #label-tags {
            display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
        }
        .label-tag {
            background: rgba(110,231,183,0.12);
            border: 1px solid rgba(110,231,183,0.3);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            white-space: nowrap;
        }

        /* Sidebar active-filter indicator — lives below label hint */
        #sidebar-filter-tag-row {
            display: none;
            align-items: center; gap: 6px;
            padding: 5px 2px;
            font-size: 11px;
            border-bottom: 1px solid var(--border);
        }
        #sidebar-filter-tag-row.visible { display: flex; }
        #sidebar-filter-tag {
            display: inline-flex; align-items: center; gap: 5px;
            font-family: var(--mono); font-size: 11px;
            padding: 2px 7px; border-radius: 4px;
            border: 1px solid var(--border);
            max-width: 100%; overflow: hidden; text-overflow: ellipsis;
        }
        #sidebar-filter-tag.mode-highlight { color: var(--accent); border-color: rgba(110,231,183,0.4); background: rgba(110,231,183,0.07); }
        #sidebar-filter-tag.mode-filter    { color: var(--yellow); border-color: rgba(251,191,36,0.4);  background: rgba(251,191,36,0.07); }
        #sidebar-filter-tag.mode-exclude   { color: var(--red);    border-color: rgba(255,77,109,0.4);  background: rgba(255,77,109,0.07); }

        /* Props list */
        #props-list { overflow-y: auto; flex: 1; }
        #props-list::-webkit-scrollbar { width: 4px; }
        #props-list::-webkit-scrollbar-track { background: transparent; }
        #props-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .prop-item {
            padding: 8px 12px 8px 10px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            display: grid;
            grid-template-columns: 22px 1fr auto;
            align-items: center;
            gap: 6px;
        }
        .prop-item:hover { background: var(--surface2); }
        .prop-item.open { background: rgba(110,231,183,0.07); }

        .label-cb { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .label-cb input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }

        .prop-name-btn { display: flex; align-items: center; gap: 6px; cursor: pointer; min-width: 0; }
        .prop-name {
            font-family: var(--mono); font-size: 13px; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: color 0.15s;
        }
        .prop-item.has-highlight .prop-name { color: var(--accent); }
        .prop-item.has-filter .prop-name { color: var(--yellow); }
        .prop-item.has-exclude .prop-name { color: var(--red); }

        .prop-meta { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .prop-count-badge {
            font-size: 10px; color: var(--text-muted);
            background: var(--surface2); padding: 1px 5px; border-radius: 3px;
        }
        .prop-arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; cursor: pointer; }
        .prop-item.open .prop-arrow { transform: rotate(90deg); color: var(--accent); }

        .values-panel {
            background: var(--bg); border-bottom: 1px solid var(--border);
            max-height: 180px; overflow-y: auto; display: none;
        }
        .values-panel.open { display: block; }
        .values-panel::-webkit-scrollbar { width: 3px; }
        .values-panel::-webkit-scrollbar-thumb { background: var(--border); }

        .value-item {
            padding: 7px 14px 7px 38px; font-family: var(--mono); font-size: 12px;
            color: var(--text-dim); cursor: pointer;
            display: flex; align-items: center; justify-content: space-between; gap: 6px;
            transition: background 0.1s, color 0.1s;
            border-bottom: 1px solid rgba(46,46,56,0.4);
        }
        .value-item:hover { background: var(--surface2); color: var(--text); }
        .value-item.state-highlight { color: var(--accent); background: rgba(110,231,183,0.06); }
        .value-item.state-filter    { color: var(--yellow); background: rgba(251,191,36,0.06); }
        .value-item.state-exclude   { color: var(--red);    background: rgba(255,77,109,0.06); }

        .value-count {
            font-size: 10px; color: var(--text-muted);
            background: var(--surface); padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
        }
        .value-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #sidebar-empty {
            padding: 24px 16px; text-align: center;
            color: var(--text-muted); font-size: 13px; line-height: 1.6;
        }

        /* ── GEOMETRY FILTER FOOTER — always visible at bottom of sidebar ── */
        #geom-filter {
            flex-shrink: 0;
            display: flex; gap: 10px; align-items: center;
            padding: 8px 14px;
            border-top: 1px solid var(--border);
            background: var(--surface2);
        }
        #geom-filter-label {
            font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--text-muted);
            flex-shrink: 0;
        }
        .geom-check-label {
            display: flex; align-items: center; gap: 4px;
            font-size: 12px; color: var(--text-muted); cursor: pointer;
            user-select: none; transition: color 0.15s;
        }
        .geom-check-label:hover { color: var(--text); }
        .geom-check-label input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }
        .geom-check-label.active { color: var(--accent); }

        /* ── DROP OVERLAY ── */
        #drop-overlay {
            position: fixed; inset: 0;
            background: rgba(15,15,17,0.88);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.15s;
            pointer-events: none;
        }
        #drop-overlay.dragging { opacity: 1; pointer-events: all; }
        .drop-box {
            border: 2px dashed var(--accent); border-radius: 16px;
            padding: 48px 64px; text-align: center; color: var(--accent);
            pointer-events: none;
        }
        .drop-box .icon { font-size: 40px; margin-bottom: 12px; }
        .drop-box h3 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
        .drop-box p { font-size: 15px; color: var(--text-muted); }

        /* ── URL LOADER MODAL ── */
        #url-modal {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(15,15,17,0.8); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        #url-modal.open { opacity: 1; pointer-events: all; }
        #url-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 24px 24px 20px;
            width: 480px; max-width: calc(100vw - 32px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.6);
        }
        #url-box h3 {
            font-size: 14px; font-weight: 600; color: var(--text);
            margin-bottom: 14px;
        }
        #url-input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); font-family: var(--mono); font-size: 12px;
            padding: 8px 12px; border-radius: 6px; outline: none;
            transition: border-color 0.15s; margin-bottom: 10px;
        }
        #url-input:focus { border-color: var(--accent); }
        #url-input::placeholder { color: var(--text-muted); }
        #url-error {
            font-size: 12px; color: var(--red); margin-bottom: 8px; display: none;
        }
        #url-box-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .url-btn {
            font-family: var(--sans); font-size: 13px; font-weight: 500;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
        }
        #url-cancel { background: none; border: 1px solid var(--border); color: var(--text-muted); }
        #url-cancel:hover { border-color: var(--text-muted); color: var(--text); }
        #url-load { background: var(--accent); border: none; color: #0f0f11; font-weight: 600; }
        #url-load:hover { opacity: 0.85; }

        /* Share button — no longer a floating button, handled in bar */
        /* (share-btn is now inside the bottom bar action row) */

        /* ── POPUP ── */
        .maplibregl-popup-content {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 10px !important; padding: 0 !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
            min-width: 220px; max-width: 340px;
            font-family: var(--sans) !important; color: var(--text) !important;
            overflow: hidden;
        }
        .maplibregl-popup-tip { display: none !important; }

        .popup-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px 6px; border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .popup-header-label {
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted);
        }
        .popup-close-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1;
            transition: color 0.1s;
        }
        .popup-close-btn:hover { color: var(--text); }

        .popup-inner { max-height: 300px; overflow-y: auto; }
        .popup-inner::-webkit-scrollbar { width: 4px; }
        .popup-inner::-webkit-scrollbar-track { background: transparent; }
        .popup-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .popup-row {
            display: flex; align-items: baseline; gap: 8px;
            padding: 7px 12px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.1s;
        }
        .popup-row:last-child { border-bottom: none; }
        .popup-row:hover { background: var(--surface2); }
        .popup-row.state-highlight { background: rgba(110,231,183,0.07); }
        .popup-row.state-highlight .popup-val { color: var(--accent); }
        .popup-row.state-filter { background: rgba(251,191,36,0.07); }
        .popup-row.state-filter .popup-val { color: var(--yellow); }
        .popup-row.state-exclude { background: rgba(255,77,109,0.07); }
        .popup-row.state-exclude .popup-val { color: var(--red); }
        .popup-row.no-click { cursor: default; }
        .popup-row.no-click:hover { background: transparent; }

        .popup-key { font-family: var(--mono); font-size: 12px; color: var(--text-muted); min-width: 90px; flex-shrink: 0; }
        .popup-val { font-size: 13px; color: var(--text); word-break: break-word; transition: color 0.1s; }
        .popup-hint {
            padding: 6px 12px; font-size: 11px; color: var(--text-muted);
            border-top: 1px solid var(--border); text-align: center; background: var(--surface2);
        }

        /* ── SELECTION BAR ── */
        #selection-bar {
            position: absolute;
            bottom: 12px; left: 12px;
            width: 290px;   /* match sidebar exactly */
            z-index: 10; background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 10px 14px;
            display: flex; flex-direction: column; gap: 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: opacity 0.2s, transform 0.2s;
            opacity: 0; pointer-events: none;
            transform: translateY(8px);
            /* fixed height — always 3 rows + optional filter tag row */
        }
        #selection-bar.visible { opacity: 1; pointer-events: all; transform: translateY(0); }

        /* filter tag — moved to sidebar, bar version removed */

        /* action row — file/url/share buttons, spans full width of bar */
        #action-row {
            display: flex;
            gap: 6px;
            border-top: 1px solid var(--border);
            padding-top: 7px;
            margin-top: 2px;
        }
        .action-btn {
            font-family: var(--sans); font-size: 11px; font-weight: 500;
            padding: 5px 0; border-radius: 5px; cursor: pointer;
            border: 1px solid var(--border); color: var(--text-muted);
            background: transparent; white-space: nowrap;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            flex: 1; text-align: center; width: auto;
        }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.06); }
        #share-btn { display: none; }
        #share-btn.visible { display: block; }

        /* stat rows — 3-column grid: [num] [label] [button]
           button column is auto-sized to the widest button; all buttons justify to the right edge */
        .bar-row {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            align-items: center;
            gap: 0 8px;
            padding: 5px 0;
        }
        .bar-row + .bar-row { border-top: 1px solid var(--border); }

        .stat-num {
            font-family: var(--mono); font-size: 16px; font-weight: 400;
            line-height: 1; text-align: right;
        }
        .stat-num.red    { color: var(--magenta); }
        .stat-num.green  { color: var(--accent); }
        .stat-num.muted  { color: var(--text-muted); }
        .stat-label { font-size: 13px; color: var(--text-muted); padding-left: 2px; }

        /* outline-only buttons, fill on hover — all same width, right-aligned */
        .bar-btn {
            font-family: var(--sans); font-size: 12px; font-weight: 500;
            padding: 5px 10px; border-radius: 5px; cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            background: transparent; white-space: nowrap;
            text-align: center; width: 116px; justify-self: end;
        }
        #add-to-layer-btn {
            border: 1px solid rgba(249,115,22,0.5); color: #f97316;
        }
        #add-to-layer-btn:hover { background: #f97316; color: white; border-color: #f97316; }

        #save-btn {
            border: 1px solid rgba(224,64,251,0.5); color: var(--magenta);
        }
        #save-btn:hover { background: var(--magenta); color: white; border-color: var(--magenta); }

        #save-visible-btn {
            border: 1px solid rgba(110,231,183,0.5); color: var(--accent);
        }
        #save-visible-btn:hover { background: var(--accent); color: #0f0f11; border-color: var(--accent); }

        #clear-btn {
            border: 1px solid rgba(224,64,251,0.5); color: var(--magenta);
        }
        #clear-btn:hover { background: var(--magenta); color: white; border-color: var(--magenta); }

        /* ── MAPLIBRE OVERRIDES ── */
        .maplibregl-ctrl-top-right { top: 12px; right: 12px; }
        .maplibregl-ctrl-group {
            background: var(--surface) !important; border: 1px solid var(--border) !important;
            border-radius: 8px !important; overflow: hidden;
        }
        .maplibregl-ctrl-group button {
            background: var(--surface) !important;
            filter: brightness(2.5);
        }
        .maplibregl-ctrl-group button:hover {
            background: var(--surface2) !important;
            filter: brightness(3.5);
        }

        /* ── MOBILE ── */
        #sidebar-toggle {
            display: none; /* hidden on desktop */
            width: 100%; margin-top: 6px;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text-muted); font-family: var(--sans); font-size: 12px;
            padding: 6px 10px; border-radius: 6px; cursor: pointer;
            text-align: center; transition: all 0.15s;
        }
        #sidebar-toggle:hover { border-color: var(--accent); color: var(--accent); }

        @media (max-width: 600px) {
            /* Keep same width as desktop — don't stretch full screen */
            #sidebar { left: 8px; top: 8px; }
            #selection-bar { left: 8px; bottom: 8px; }
            #sidebar-toggle { display: block; }
            /* props list and geom filter hidden by default on mobile */
            #props-list { display: none; }
            #geom-filter { display: none; }
            /* shown when sidebar is expanded */
            #sidebar.expanded #props-list { display: block; }
            #sidebar.expanded #geom-filter { display: flex; }
            /* sidebar header compact on mobile */
            #sidebar-subtitle { display: none; }
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="drop-overlay">
    <div class="drop-box">
        <div class="icon">⬇</div>
        <h3>Drop GeoJSON file</h3>
        <p>.geojson or .geojsonl accepted</p>
    </div>
</div>

<div id="sidebar">
    <div id="sidebar-header">
        <div id="sidebar-header-top">
            <h2>Properties</h2>
            <div id="sort-controls">
                <button class="sort-btn active" id="sort-keys-btn"># Props</button>
                <button class="sort-btn" id="sort-vals-btn"># Places</button>
                <button class="sort-btn" id="sort-alpha-btn">A–Z</button>
            </div>
        </div>
        <p id="sidebar-subtitle">No file loaded</p>
        <div id="prop-search-wrap">
            <span id="prop-search-icon">⌕</span>
            <input type="text" id="prop-search" placeholder="Search properties…">
        </div>
        <!-- Fix 2: label hint with live active-label tags -->
        <div id="label-hint">
            <span id="label-hint-icon">🏷</span>
            <span id="label-hint-text">Labels:</span>
            <div id="label-tags"><span style="color:var(--text-muted);font-size:11px">check ☐ to add</span></div>
        </div>
        <!-- Fix 2: active filter tag below label hint -->
        <div id="sidebar-filter-tag-row">
            <div id="sidebar-filter-tag">
                <span id="sidebar-filter-tag-icon"></span>
                <span id="sidebar-filter-tag-text"></span>
            </div>
        </div>
        <!-- Mobile toggle -->
        <button id="sidebar-toggle" onclick="toggleSidebar()">▼ Show Properties</button>
    </div>
    <div id="props-list">
        <div id="sidebar-empty">Upload a GeoJSON file to explore properties and filter features.</div>
    </div>
    <!-- FIX 2: geometry filter always visible at bottom -->
    <div id="geom-filter">
        <span id="geom-filter-label">Show</span>
        <label class="geom-check-label active" id="lbl-point">
            <input type="checkbox" id="chk-point" checked> ● Pts
        </label>
        <label class="geom-check-label active" id="lbl-line">
            <input type="checkbox" id="chk-line" checked> ╱ Lines
        </label>
        <label class="geom-check-label active" id="lbl-poly">
            <input type="checkbox" id="chk-poly" checked> ▭ Polys
        </label>
        <label class="geom-check-label" id="lbl-polydot" title="Show polygon centroids as dots when zoomed out">
            <input type="checkbox" id="chk-polydot"> ◉ Dots
        </label>
    </div>
</div>

<input type="file" id="file-input" accept=".geojson,.json,.geojsonl" style="display:none">

<!-- URL loader modal -->
<div id="url-modal">
    <div id="url-box">
        <h3>Load GeoJSON from URL</h3>
        <input type="text" id="url-input" placeholder="https://example.com/data.geojson" autocomplete="off" spellcheck="false">
        <div id="url-error"></div>
        <div id="url-box-btns">
            <button class="url-btn" id="url-cancel" onclick="closeUrlModal()">Cancel</button>
            <button class="url-btn" id="url-load" onclick="loadFromUrl()">Load</button>
        </div>
    </div>
</div>

<div id="selection-bar">
    <!-- row 0: tile-selected road features (only when >0) -->
    <div class="bar-row" id="tile-row" style="display:none">
        <span class="stat-num" style="color:#f97316" id="tile-num">0</span>
        <span class="stat-label">map features</span>
        <button class="bar-btn" id="add-to-layer-btn">⊕ Add to Layer</button>
    </div>
    <!-- row 1: selected · save selected -->
    <div class="bar-row">
        <span class="stat-num red" id="sel-num">0</span>
        <span class="stat-label">selected</span>
        <button class="bar-btn" id="save-btn">⬇ Save Selected</button>
    </div>

    <div class="bar-row">
        <span class="stat-num green" id="vis-num">0</span>
        <span class="stat-label">visible</span>

        <button class="action-btn" id="url-btn" onclick="openUrlModal()">🔗 URL</button>
        <button class="action-btn" id="reset-btn" onclick="resetAll()">↺ Reset</button>
        <button class="action-btn" id="share-btn" onclick="copyShareUrl()">⎘ Share</button>
