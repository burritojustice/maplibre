</div>

<script>
const styleUrl = 'https://api.protomaps.com/styles/v5/white/en.json?key=ffc24a4325d458ce';

const map = new maplibregl.Map({
    container: 'map',
    style: styleUrl,
    center: [0, 20],
    zoom: 2
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.once('load', () => { setupTileInteraction(); restoreFromHash(); });

// ── STATE ──
let allFeatures = [];
let selectedIds = new Set();
let activeFilter = null;
let highlightedIds = new Set();
let hiddenIds = new Set();

let hoverPopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 12 });
let lastHoveredId = null;

let frozenPopup = null;
let frozenFeatureProps = null;
let popupRowStates = {};

let sortMode = 'keys';   // 'keys' | 'vals' | 'alpha'
let propData = {};
let openPropKey = null;
let labelProps = new Set();
let geomVisible = { point: true, line: true, poly: true };
let currentDataUrl = null;   // URL of loaded data (if loaded via URL)
let currentSourceName = '';  // base name of the source file/URL

// ── TILE INTERACTION STATE ──
const TILE_ROAD_LAYERS = ['roads', 'bicycle_routes', 'transit'];
const tileSelected = new Map(); // key `layerId::featureId` → {feature, layerId, sourceId, sourceLayer}
let tileHoveredLayer = null;
let tileHoveredSource = null;
let tileHoveredSourceLayer = null;
let tileHoveredId = null;

map.once('style.load', () => {}); // placeholder — tile setup runs on 'load'

function setupTileInteraction() {
    const allLayers = map.getStyle().layers;
    const roadish = allLayers.filter(l =>
        ['roads','road','path','transit','bicycle','foot','walk','rail','ferry','route','physical'].some(x =>
            (l.id + (l['source-layer'] || '')).toLowerCase().includes(x)
        )
    );
    console.log('[GeoJSON Viewer] Road-ish layers:', roadish.map(l => ({id: l.id, source: l.source, 'source-layer': l['source-layer'], type: l.type})));

    const TARGET_SOURCE_LAYERS = ['roads', 'bicycle_routes', 'transit', 'paths', 'physical_line'];
    const roadLayers = allLayers.filter(l =>
        l.type === 'line' && l['source-layer'] &&
        TARGET_SOURCE_LAYERS.some(t => l['source-layer'].toLowerCase().includes(t))
    );
    console.log('[GeoJSON Viewer] Interactive layers:', roadLayers.map(l => l.id));

    // ── OVERLAY SOURCES for precise per-segment highlighting ──
    // setFeatureState affects ALL tile segments with the same ID (e.g. a long named path).
    // Instead, we copy the exact clicked/hovered geometry into separate GeoJSON overlay layers.
    map.addSource('tile-hover-overlay', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addSource('tile-select-overlay', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

    map.addLayer({ id: 'tile-hover-line', type: 'line', source: 'tile-hover-overlay',
        paint: { 'line-color': '#2dd4bf', 'line-width': 5, 'line-opacity': 0.85 }
    });
    map.addLayer({ id: 'tile-select-line', type: 'line', source: 'tile-select-overlay',
        paint: { 'line-color': '#e040fb', 'line-width': 4, 'line-opacity': 0.9 }
    });

    function updateHoverOverlay(feature) {
        map.getSource('tile-hover-overlay').setData({
            type: 'FeatureCollection',
            features: feature ? [{ type: 'Feature', geometry: feature.geometry, properties: {} }] : []
        });
    }

    function updateSelectOverlay() {
        map.getSource('tile-select-overlay').setData({
            type: 'FeatureCollection',
            features: [...tileSelected.values()].map(({ feature }) => ({
                type: 'Feature', geometry: feature.geometry, properties: {}
            }))
        });
    }

    roadLayers.forEach(layer => {
        const layerId = layer.id;
        const sourceId = layer.source;
        const sourceLayer = layer['source-layer'];

        map.on('mousemove', layerId, (e) => {
            const f = e.features && e.features[0];
            if (!f) return;
            map.getCanvas().style.cursor = 'pointer';

            // Key by pixel position for per-segment precision
            const pixelKey = `${Math.round(e.point.x)},${Math.round(e.point.y)}`;
            if (pixelKey === tileHoveredId) { return; }
            tileHoveredId = pixelKey;
            tileHoveredLayer = layerId;
            tileHoveredSource = sourceId;
            tileHoveredSourceLayer = sourceLayer;
            // Show the nearest sub-segment so hover matches what clicking will select
            const nearestLine = extractNearestSegment(f.geometry, [e.lngLat.lng, e.lngLat.lat], f.properties);
            updateHoverOverlay({ ...f, geometry: nearestLine });

            // Show ALL properties sorted alphabetically, plus feature ID at top
            const props = f.properties || {};
            // Check selection by geometry coords since pixel coords change on pan
            const coords = f.geometry && f.geometry.coordinates;
            const geomKey = `${layerId}::${Math.round(e.point.x)},${Math.round(e.point.y)}`;
            const isSel = [...tileSelected.keys()].some(k => k.startsWith(`${layerId}::`) &&
                tileSelected.get(k).feature.id === f.id);

            const allEntries = [
                ['id', f.id != null ? f.id : '—'],
                ['layer', sourceLayer],
                ...Object.entries(props)
                    .filter(([, v]) => v != null && v !== '' && v !== 'null' && v !== 'undefined')
                    .sort(([a], [b]) => a.localeCompare(b))
            ];

            const rows = allEntries.map(([k, v]) =>
                `<div class="popup-row no-click"><span class="popup-key">${escHtml(k)}</span><span class="popup-val">${escHtml(String(v))}</span></div>`
            ).join('');
            hoverPopup.setHTML(
                `<div class="popup-header" style="background:rgba(249,115,22,0.12)">` +
                `<span class="popup-header-label" style="color:#f97316">🗺 ${sourceLayer}</span></div>` +
                `<div class="popup-inner">${rows}</div>` +
                `<div class="popup-hint">${isSel ? 'Click to deselect' : 'Click to select'}</div>`
            ).setLngLat(e.lngLat).addTo(map);
        });

        map.on('mouseleave', layerId, () => {
            tileHoveredLayer = null; tileHoveredSource = null;
            tileHoveredSourceLayer = null; tileHoveredId = null;
            updateHoverOverlay(null);
            map.getCanvas().style.cursor = '';
            hoverPopup.remove();
        });

        map.on('click', layerId, (e) => {
            e.preventDefault();
            const f = e.features && e.features[0];
            if (!f || !f.geometry) return;

            // Decompose to the single nearest LineString sub-segment to the click point.
            // This handles MultiLineString (merged road tiles) and long LineStrings.
            const clickLngLat = [e.lngLat.lng, e.lngLat.lat];
            const nearestLine = extractNearestSegment(f.geometry, clickLngLat, f.properties);

            // Key by click pixel — one selection per click, fully deterministic
            const pixelKey = `${Math.round(e.point.x)},${Math.round(e.point.y)}`;
            const geomKey = `${layerId}::${pixelKey}`;

            if (tileSelected.has(geomKey)) {
                tileSelected.delete(geomKey);
            } else {
                // Store a synthetic feature with just the nearest sub-segment geometry
                const syntheticFeature = { ...f, geometry: nearestLine };
                tileSelected.set(geomKey, { feature: syntheticFeature, layerId, sourceId, sourceLayer, tileId: f.id });
            }
            updateSelectOverlay();
            updateTileSelectionRow();
            hoverPopup.remove();
        });
    });
}

// ── GEOMETRY HELPERS ──

// Given a geometry (LineString or MultiLineString) and a click point [lng, lat],
// returns a LineString geometry for the single nearest straight sub-segment.
// For a road merged from 50 sub-segments, this gives you exactly one ~20m piece.
function extractNearestSegment(geometry, clickPoint, properties) {
    // Collect all consecutive coordinate pairs across all rings/lines
    const segments = []; // each entry: { coords: [[lng,lat],[lng,lat]] }

    const addLine = (coords) => {
        for (let i = 0; i < coords.length - 1; i++) {
            segments.push([coords[i], coords[i + 1]]);
        }
    };

    if (geometry.type === 'LineString') {
        addLine(geometry.coordinates);
    } else if (geometry.type === 'MultiLineString') {
        geometry.coordinates.forEach(line => addLine(line));
    } else {
        // Fallback for other types — return original
        return geometry;
    }

    if (segments.length === 0) return geometry;
    if (segments.length === 1) {
        return { type: 'LineString', coordinates: segments[0] };
    }

    // Find the segment with minimum distance to the click point
    let bestSeg = segments[0];
    let bestDist = Infinity;

    segments.forEach(seg => {
        const d = pointToSegmentDistSq(clickPoint, seg[0], seg[1]);
        if (d < bestDist) { bestDist = d; bestSeg = seg; }
    });

    return { type: 'LineString', coordinates: bestSeg };
}

// Squared distance from point P to line segment AB (all [lng, lat])
function pointToSegmentDistSq(p, a, b) {
    const dx = b[0] - a[0], dy = b[1] - a[1];
    if (dx === 0 && dy === 0) {
        // Segment is a point
        return Math.pow(p[0] - a[0], 2) + Math.pow(p[1] - a[1], 2);
    }
    let t = ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / (dx * dx + dy * dy);
    t = Math.max(0, Math.min(1, t));
    const nearX = a[0] + t * dx;
    const nearY = a[1] + t * dy;
    return Math.pow(p[0] - nearX, 2) + Math.pow(p[1] - nearY, 2);
}

function updateTileSelectionRow() {
    const n = tileSelected.size;
    document.getElementById('tile-num').textContent = n.toLocaleString();
    document.getElementById('tile-row').style.display = n > 0 ? 'grid' : 'none';
    document.getElementById('selection-bar').classList.toggle('visible', n > 0 || allFeatures.length > 0);
    requestAnimationFrame(positionSidebar);
}

function addTileSelectionToLayer() {
    if (tileSelected.size === 0) return;

    // Bootstrap empty layer if nothing loaded yet
    if (!map.getSource('geojson-data')) {
        ingestGeoJSON({ type: 'FeatureCollection', features: [] }, 'map-selection', true);
    }

    let added = 0;
    tileSelected.forEach(({ feature, layerId }) => {
        const alreadyAdded = allFeatures.some(f =>
            f.properties._tile_id === String(feature.id) && f.properties._source_layer === layerId
        );
        if (alreadyAdded) return;

        const newId = allFeatures.length;
        allFeatures.push({
            type: 'Feature', id: newId,
            geometry: feature.geometry,
            properties: { ...feature.properties, _gvid: newId, _tile_id: String(feature.id), _source_layer: layerId }
        });
        added++;
    });

    if (added === 0) { alert('All selected map features are already in the layer.'); return; }

    const fc = { type: 'FeatureCollection', features: allFeatures };
    map.getSource('geojson-data').setData(fc);

    // Select the newly added features
    allFeatures.slice(-added).forEach(f => {
        const id = f.properties._gvid;
        selectedIds.add(id);
        map.setFeatureState({ source: 'geojson-data', id }, { selected: true });
    });

    // Clear tile selection and its overlay
    tileSelected.clear();
    if (map.getSource('tile-select-overlay')) {
        map.getSource('tile-select-overlay').setData({ type: 'FeatureCollection', features: [] });
    }
    tileSelected.clear();

    buildPropData();
    renderSidebar();
    updateSelectionBar();
    updateTileSelectionRow();
    if (!currentSourceName) currentSourceName = 'map-selection';
    document.getElementById('sidebar-subtitle').textContent =
        `${allFeatures.length} features · ${Object.keys(propData).length} props`;
}

document.getElementById('add-to-layer-btn').addEventListener('click', addTileSelectionToLayer);

// ── SIDEBAR POSITIONING ──
function positionSidebar() {
    const bar = document.getElementById('selection-bar');
    const sidebar = document.getElementById('sidebar');
    const isMobile = window.innerWidth <= 600;
    const barRect = bar.getBoundingClientRect();
    const viewH = window.innerHeight;
    const barTopFromBottom = viewH - barRect.top; // height from bottom of viewport to top of bar

    if (isMobile && !sidebar.classList.contains('expanded')) {
        // Collapsed: let the sidebar shrink to its header content height
        sidebar.style.bottom = 'auto';
        sidebar.style.height = 'auto';
    } else {
        // Desktop or expanded mobile: stretch from top down to just above the bar
        sidebar.style.height = '';
        sidebar.style.bottom = (barTopFromBottom + 10) + 'px';
    }
}

window.addEventListener('resize', positionSidebar);

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const btn = document.getElementById('sidebar-toggle');
    sidebar.classList.toggle('expanded');
    btn.textContent = sidebar.classList.contains('expanded') ? '▲ Hide Properties' : '▼ Show Properties';
    requestAnimationFrame(positionSidebar);
}


function openUrlModal() {
    const modal = document.getElementById('url-modal');
    // Pre-fill from current hash if present
    const params = getHashParams();
    if (params.url) document.getElementById('url-input').value = params.url;
    document.getElementById('url-error').style.display = 'none';
    modal.classList.add('open');
    setTimeout(() => document.getElementById('url-input').focus(), 50);
}
function closeUrlModal() {
    document.getElementById('url-modal').classList.remove('open');
}
document.getElementById('url-modal').addEventListener('click', e => { if (e.target === document.getElementById('url-modal')) closeUrlModal(); });
document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadFromUrl(); if (e.key === 'Escape') closeUrlModal(); });

async function loadFromUrl() {
    const raw = document.getElementById('url-input').value.trim();
    if (!raw) return;
    const errEl = document.getElementById('url-error');
    errEl.style.display = 'none';
    document.getElementById('url-load').textContent = 'Loading…';
    try {
        const res = await fetch(raw);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        let geojson;
        try { geojson = JSON.parse(text); } catch {
            const lines = text.trim().split('\n').filter(l => l.trim());
            const features = lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
            if (features.length) geojson = { type: 'FeatureCollection', features };
        }
        if (!geojson) throw new Error('Could not parse response as GeoJSON');
        if (geojson.type === 'Feature') geojson = { type: 'FeatureCollection', features: [geojson] };
        currentDataUrl = raw;
        currentSourceName = raw.split('/').pop().split('?')[0].replace(/\.(geojson|json|geojsonl)$/i, '') || 'data';
        closeUrlModal();
        ingestGeoJSON(geojson, raw.split('/').pop() || 'data.geojson');
        pushHashState();
    } catch (err) {
        errEl.textContent = `Error: ${err.message}`;
        errEl.style.display = 'block';
    } finally {
        document.getElementById('url-load').textContent = 'Load';
    }
}

// ── URL HASH STATE ──
// Format: #url=...&labels=prop1,prop2&filter=prop:value:mode
function getHashParams() {
    const hash = location.hash.slice(1);
    const out = {};
    hash.split('&').forEach(part => {
        const i = part.indexOf('=');
        if (i < 0) return;
        try { out[decodeURIComponent(part.slice(0, i))] = decodeURIComponent(part.slice(i + 1)); } catch {}
    });
    return out;
}

function pushHashState() {
    const parts = [];
    if (currentDataUrl) parts.push(`url=${encodeURIComponent(currentDataUrl)}`);
    if (labelProps.size) parts.push(`labels=${encodeURIComponent([...labelProps].join(','))}`);
    if (activeFilter) parts.push(`filter=${encodeURIComponent(`${activeFilter.prop}::${activeFilter.value}::${activeFilter.mode}`)}`);
    // Save current map extent
    const c = map.getCenter();
    const z = map.getZoom();
    parts.push(`map=${encodeURIComponent(`${z.toFixed(3)}/${c.lat.toFixed(5)}/${c.lng.toFixed(5)}`)}`);
    history.replaceState(null, '', parts.length ? '#' + parts.join('&') : location.pathname + location.search);
    document.getElementById('share-btn').classList.toggle('visible', !!currentDataUrl);
}

function copyShareUrl() {
    pushHashState();
    navigator.clipboard.writeText(location.href).then(() => {
        const btn = document.getElementById('share-btn');
        btn.textContent = '✓ Copied!';
        setTimeout(() => { btn.innerHTML = '⎘ Share'; }, 2000);
    }).catch(() => {
        prompt('Copy this URL:', location.href);
    });
}

// ── RESTORE FROM HASH ON LOAD ──
async function restoreFromHash() {
    const params = getHashParams();
    if (!params.url) return;
    document.getElementById('url-input').value = params.url;
    try {
        const res = await fetch(params.url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        let geojson;
        try { geojson = JSON.parse(text); } catch {
            const lines = text.trim().split('\n').filter(l => l.trim());
            const features = lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
            if (features.length) geojson = { type: 'FeatureCollection', features };
        }
        if (!geojson) return;
        if (geojson.type === 'Feature') geojson = { type: 'FeatureCollection', features: [geojson] };
        currentDataUrl = params.url;
        currentSourceName = params.url.split('/').pop().split('?')[0].replace(/\.(geojson|json|geojsonl)$/i, '') || 'data';
        // Pass skipFit=true if we have a saved map extent
        ingestGeoJSON(geojson, params.url.split('/').pop() || 'data.geojson', !!params.map);

        // Restore map extent (before labels/filter so map is positioned correctly)
        if (params.map) {
            try {
                const [z, lat, lng] = params.map.split('/').map(Number);
                map.jumpTo({ center: [lng, lat], zoom: z });
            } catch {}
        }
        // Restore labels
        if (params.labels) {
            params.labels.split(',').forEach(k => { if (k) labelProps.add(k); });
            updateLabels();
        }
        // Restore filter
        if (params.filter) {
            const parts = params.filter.split('::');
            if (parts.length === 3) {
                const [prop, value, mode] = parts;
                if (mode === 'highlight') { activeFilter = { prop, value, mode }; doHighlight(prop, value); }
                else if (mode === 'filter') { activeFilter = { prop, value, mode }; doFilterSelect(prop, value); }
                else if (mode === 'exclude') { activeFilter = { prop, value, mode }; doExclude(prop, value); }
                renderSidebar();
            }
        }
        document.getElementById('share-btn').classList.add('visible');
    } catch (err) {
        console.warn('Could not restore from URL hash:', err);
    }
}

// ── DRAG & DROP ──
const dropOverlay = document.getElementById('drop-overlay');
let dragDepth = 0;

document.addEventListener('dragenter', e => { e.preventDefault(); dragDepth++; if (dragDepth === 1) dropOverlay.classList.add('dragging'); });
document.addEventListener('dragleave', e => { dragDepth--; if (dragDepth <= 0) { dragDepth = 0; dropOverlay.classList.remove('dragging'); } });
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', e => {
    e.preventDefault(); dragDepth = 0; dropOverlay.classList.remove('dragging');
    const file = e.dataTransfer.files[0]; if (file) loadFile(file);
});
document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

// ── FILE LOADING ──
function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
        const text = e.target.result;
        let geojson;
        try { geojson = JSON.parse(text); } catch {
            const lines = text.trim().split('\n').filter(l => l.trim());
            const features = lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
            if (features.length) geojson = { type: 'FeatureCollection', features };
        }
        if (!geojson) return alert('Could not parse file.');
        if (geojson.type === 'Feature') geojson = { type: 'FeatureCollection', features: [geojson] };
        currentDataUrl = null;
        currentSourceName = file.name.replace(/\.(geojson|json|geojsonl)$/i, '');
        document.getElementById('share-btn').classList.remove('visible');
        ingestGeoJSON(geojson, file.name);
    };
    reader.readAsText(file);
}

function ingestGeoJSON(geojson, filename, skipFit = false) {
    allFeatures = geojson.features.map((f, i) => ({
        ...f, id: i,
        properties: { ...f.properties, _gvid: i }
    }));

    selectedIds.clear(); highlightedIds.clear(); hiddenIds.clear();
    activeFilter = null; popupRowStates = {}; openPropKey = null; labelProps.clear();
    lastHoveredId = null; hoveredMapId = null;
    updateLabelHint();
    document.getElementById('save-visible-btn').style.visibility = 'hidden';
    if (frozenPopup) { frozenPopup.remove(); frozenPopup = null; frozenFeatureProps = null; }
    hoverPopup.remove();
    updateSelectionBar();

    const fc = { type: 'FeatureCollection', features: allFeatures };

    if (map.getSource('geojson-data')) {
        map.getSource('geojson-data').setData(fc);
        if (map.getLayer('gv-labels')) map.removeLayer('gv-labels');
        if (map.getLayer('gv-labels-line')) map.removeLayer('gv-labels-line');
        addLabelLayer();
    } else {
        map.addSource('geojson-data', { type: 'geojson', data: fc, promoteId: '_gvid' });

        const colorExpr = ['case',
            ['boolean', ['feature-state', 'selected'],    false], '#e040fb',
            ['boolean', ['feature-state', 'filtered'],    false], '#fbbf24',
            ['boolean', ['feature-state', 'highlighted'], false], '#6ee7b7',
            ['boolean', ['feature-state', 'hovered'],     false], '#2dd4bf',
            '#3b82f6'];

        const visExpr = ['case', ['boolean', ['feature-state', 'hidden'], false], 0, 1];

        map.addLayer({
            id: 'gv-fill', type: 'fill', source: 'geojson-data',
            filter: ['==', ['geometry-type'], 'Polygon'],
            paint: {
                'fill-color': colorExpr,
                'fill-opacity': ['case',
                    ['boolean', ['feature-state', 'hidden'],      false], 0,
                    ['boolean', ['feature-state', 'selected'],    false], 0.6,
                    ['boolean', ['feature-state', 'filtered'],    false], 0.5,
                    ['boolean', ['feature-state', 'highlighted'], false], 0.35,
                    ['boolean', ['feature-state', 'hovered'],     false], 0.4,
                    0.3]
            }
        });
        map.addLayer({
            id: 'gv-outline', type: 'line', source: 'geojson-data',
            filter: ['==', ['geometry-type'], 'Polygon'],
            paint: {
                'line-color': colorExpr, 'line-opacity': visExpr,
                'line-width': ['case', ['boolean', ['feature-state', 'selected'], false], 2, 1]
            }
        });
        map.addLayer({
            id: 'gv-line', type: 'line', source: 'geojson-data',
            filter: ['in', ['geometry-type'], ['literal', ['LineString', 'MultiLineString']]],
            paint: { 'line-color': colorExpr, 'line-width': 2, 'line-opacity': visExpr }
        });
        map.addLayer({
            id: 'gv-point', type: 'circle', source: 'geojson-data',
            filter: ['==', ['geometry-type'], 'Point'],
            paint: {
                'circle-color': ['case', ['boolean', ['feature-state', 'hidden'], false], 'rgba(0,0,0,0)', 'rgba(255,255,255,0.20)'],
                'circle-radius': 6,
                'circle-stroke-color': ['case', ['boolean', ['feature-state', 'hidden'], false], 'rgba(0,0,0,0)', colorExpr],
                'circle-stroke-width': 2
            }
        });

        addLabelLayer();

        addLabelLayer();

        // Polygon centroid dot layer — hidden by default, toggled by user
        // Only renders features with an active state (selected/filtered/highlighted) so blue polygons don't get dots
        map.addLayer({
            id: 'gv-poly-dot', type: 'circle', source: 'geojson-data',
            filter: ['in', ['geometry-type'], ['literal', ['Polygon', 'MultiPolygon']]],
            layout: { 'visibility': 'none' },
            paint: {
                'circle-color': 'rgba(255,255,255,0.20)',
                'circle-radius': 5,
                'circle-stroke-color': colorExpr,
                'circle-stroke-width': 2,
                // Only visible for features with an active state; hidden features and plain blue ones are transparent
                'circle-opacity': ['case',
                    ['boolean', ['feature-state', 'hidden'],      false], 0,
                    ['boolean', ['feature-state', 'selected'],    false], 1,
                    ['boolean', ['feature-state', 'filtered'],    false], 1,
                    ['boolean', ['feature-state', 'highlighted'], false], 1,
                    0],   // ← blue (no state) = invisible
                'circle-stroke-opacity': ['case',
                    ['boolean', ['feature-state', 'hidden'],      false], 0,
                    ['boolean', ['feature-state', 'selected'],    false], 1,
                    ['boolean', ['feature-state', 'filtered'],    false], 1,
                    ['boolean', ['feature-state', 'highlighted'], false], 1,
                    0]
            }
        });
        map.on('mousemove', 'gv-poly-dot', onMouseMove);
        map.on('mouseleave', 'gv-poly-dot', onMouseLeave);
        map.on('click', 'gv-poly-dot', onFeatureClick);

        ['gv-fill', 'gv-line', 'gv-point'].forEach(lyr => {
            map.on('mousemove', lyr, onMouseMove);
            map.on('mouseleave', lyr, onMouseLeave);
            map.on('click', lyr, onFeatureClick);
        });
        map.on('mousemove', 'gv-outline', onMouseMove);
        map.on('mouseleave', 'gv-outline', onMouseLeave);
    }

    if (!skipFit) {
        try {
            const coords = [];
            allFeatures.forEach(f => collectCoords(f.geometry, coords));
            if (coords.length) {
                const lngs = coords.map(c => c[0]), lats = coords.map(c => c[1]);
                map.fitBounds([[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]], { padding: 40, maxZoom: 14 });
            }
        } catch {}
    }

    buildPropData();
    renderSidebar();
    applyGeomFilters();
    updateLabels();
    updateSelectionBar();
    document.getElementById('sidebar-subtitle').textContent =
        `${allFeatures.length} features · ${Object.keys(propData).length} props`;
}

// FIX 3: two label layers — point placement for points/polygons, line placement for lines
function addLabelLayer() {
    // Point & polygon labels — placed at feature centroid
    map.addLayer({
        id: 'gv-labels', type: 'symbol', source: 'geojson-data',
        filter: ['in', ['geometry-type'], ['literal', ['Point', 'Polygon', 'MultiPolygon', 'MultiPoint']]],
        layout: {
            'text-field': '',
            'text-size': 11,
            'text-offset': [0, 1.2],
            'text-anchor': 'top',
            'text-font': ['Noto Sans Regular'],
            'text-allow-overlap': false,
            'text-ignore-placement': false
        },
        paint: {
            'text-color': '#0f0f11',
            'text-halo-color': '#e8e8f0',
            'text-halo-width': 1.5,
            'text-opacity': ['case', ['boolean', ['feature-state', 'hidden'], false], 0, 1]
        }
    });

    // Line labels — follow the path of each line
    map.addLayer({
        id: 'gv-labels-line', type: 'symbol', source: 'geojson-data',
        filter: ['in', ['geometry-type'], ['literal', ['LineString', 'MultiLineString']]],
        layout: {
            'text-field': '',
            'text-size': 11,
            'symbol-placement': 'line',
            'text-font': ['Noto Sans Regular'],
            'text-allow-overlap': false,
            'text-ignore-placement': false,
            'symbol-spacing': 250
        },
        paint: {
            'text-color': '#0f0f11',
            'text-halo-color': '#e8e8f0',
            'text-halo-width': 1.5,
            'text-opacity': ['case', ['boolean', ['feature-state', 'hidden'], false], 0, 1]
        }
    });
}

function collectCoords(geom, out) {
    if (!geom) return;
    if (geom.type === 'Point') out.push(geom.coordinates);
    else if (geom.type === 'LineString') geom.coordinates.forEach(c => out.push(c));
    else if (geom.type === 'Polygon') geom.coordinates.forEach(ring => ring.forEach(c => out.push(c)));
    else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => poly.forEach(ring => ring.forEach(c => out.push(c))));
    else if (geom.type === 'MultiLineString') geom.coordinates.forEach(line => line.forEach(c => out.push(c)));
    else if (geom.type === 'MultiPoint') geom.coordinates.forEach(c => out.push(c));
}

// ── PROP DATA ──
function buildPropData() {
    propData = {};
    allFeatures.forEach(f => {
        Object.entries(f.properties || {}).forEach(([k, v]) => {
            if (k === '_gvid') return;
            if (!propData[k]) propData[k] = { valueCounts: {}, totalWithValue: 0 };
            if (v !== null && v !== undefined && v !== '') {
                const vs = String(v);
                if (!propData[k].valueCounts[vs]) { propData[k].valueCounts[vs] = 0; propData[k].totalWithValue++; }
                propData[k].valueCounts[vs]++;
            }
        });
    });
}

// ── GEOMETRY FILTER ──
function geomTypeOf(f) {
    const t = f.geometry && f.geometry.type;
    if (!t) return null;
    if (t === 'Point' || t === 'MultiPoint') return 'point';
    if (t === 'LineString' || t === 'MultiLineString') return 'line';
    if (t === 'Polygon' || t === 'MultiPolygon') return 'poly';
    return null;
}

function applyGeomFilters() {
    if (!map.getSource('geojson-data')) return;
    allFeatures.forEach(f => {
        const id = f.properties._gvid;
        const gtype = geomTypeOf(f);
        const geomHidden = gtype ? !geomVisible[gtype] : false;
        const isValueHidden = hiddenIds.has(id);
        map.setFeatureState({ source: 'geojson-data', id }, { hidden: geomHidden || isValueHidden });
    });
}

['point', 'line', 'poly'].forEach(gtype => {
    const chk = document.getElementById(`chk-${gtype}`);
    const lbl = document.getElementById(`lbl-${gtype}`);
    chk.addEventListener('change', () => {
        geomVisible[gtype] = chk.checked;
        lbl.classList.toggle('active', chk.checked);
        applyGeomFilters();
    });
});

// Polygon dot toggle
document.getElementById('chk-polydot').addEventListener('change', function() {
    if (!map.getLayer('gv-poly-dot')) return;
    map.setLayoutProperty('gv-poly-dot', 'visibility', this.checked ? 'visible' : 'none');
    document.getElementById('lbl-polydot').classList.toggle('active', this.checked);
});

// ── LABELS ──
function updateLabelHint() {
    const tagsEl = document.getElementById('label-tags');
    if (labelProps.size === 0) {
        tagsEl.innerHTML = `<span style="color:var(--text-muted);font-size:11px">check ☐ to add</span>`;
    } else {
        tagsEl.innerHTML = [...labelProps].map(k =>
            `<span class="label-tag">${escHtml(k)}</span>`
        ).join('');
    }
}

function updateLabels() {
    const layers = ['gv-labels', 'gv-labels-line'];
    if (labelProps.size === 0) {
        layers.forEach(l => { if (map.getLayer(l)) map.setLayoutProperty(l, 'text-field', ''); });
        updateLabelHint(); return;
    }
    const parts = [...labelProps].map(key => ['coalesce', ['to-string', ['get', key]], '']);
    let expr;
    if (parts.length === 1) {
        expr = parts[0];
    } else {
        const pieces = [];
        parts.forEach((p, i) => {
            if (i === 0) { pieces.push(p); }
            else { pieces.push(['case', ['!=', p, ''], ['concat', '\n', p], '']); }
        });
        expr = ['concat', ...pieces];
    }
    layers.forEach(l => { if (map.getLayer(l)) map.setLayoutProperty(l, 'text-field', expr); });
    updateLabelHint();
}

// ── SIDEBAR ──
// FIX 3: sort by # of keys (features that have this property), # of values (unique values), or alpha
function getSortedKeys(filterStr) {
    let keys = Object.keys(propData);
    if (filterStr) {
        const q = filterStr.toLowerCase();
        keys = keys.filter(k => {
            // match property name
            if (k.toLowerCase().includes(q)) return true;
            // match any value for this property
            return Object.keys(propData[k].valueCounts).some(v => v.toLowerCase().includes(q));
        });
    }
    if (sortMode === 'alpha') {
        keys.sort((a, b) => a.localeCompare(b));
    } else if (sortMode === 'vals') {
        const totalPlaces = k => Object.values(propData[k].valueCounts).reduce((s, n) => s + n, 0);
        keys.sort((a, b) => totalPlaces(b) - totalPlaces(a));
    } else {
        keys.sort((a, b) => propData[b].totalWithValue - propData[a].totalWithValue);
    }
    return keys;
}

function renderSidebar() {
    const list = document.getElementById('props-list');
    const searchVal = document.getElementById('prop-search').value.trim();
    const keys = getSortedKeys(searchVal);
    list.innerHTML = '';
    if (!keys.length) { list.innerHTML = `<div id="sidebar-empty">No matching properties.</div>`; return; }

    keys.forEach(key => {
        const pd = propData[key];
        const numValues = Object.keys(pd.valueCounts).length;
        const sortedValues = Object.entries(pd.valueCounts).sort((a, b) => b[1] - a[1]);
        const isOpen = openPropKey === key;
        const hasHighlight = activeFilter && activeFilter.prop === key && activeFilter.mode === 'highlight';
        const hasFilter    = activeFilter && activeFilter.prop === key && activeFilter.mode === 'filter';
        const hasExclude   = activeFilter && activeFilter.prop === key && activeFilter.mode === 'exclude';
        const isLabeled    = labelProps.has(key);

        const propEl = document.createElement('div');
        propEl.className = 'prop-item' +
            (isOpen       ? ' open'         : '') +
            (hasHighlight ? ' has-highlight' : '') +
            (hasFilter    ? ' has-filter'    : '') +
            (hasExclude   ? ' has-exclude'   : '');

        const cbWrap = document.createElement('span');
        cbWrap.className = 'label-cb';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = isLabeled;
        cb.addEventListener('change', e => { e.stopPropagation(); if (cb.checked) labelProps.add(key); else labelProps.delete(key); updateLabels(); pushHashState(); });
        cb.addEventListener('click', e => e.stopPropagation());
        cbWrap.appendChild(cb);

        const nameBtn = document.createElement('span');
        nameBtn.className = 'prop-name-btn';
        nameBtn.innerHTML = `<span class="prop-name">${escHtml(key)}</span>`;
        nameBtn.addEventListener('click', () => { openPropKey = (openPropKey === key) ? null : key; renderSidebar(); });

        // Badge: # Props = features with this key; # Places = total value occurrences; A-Z = features with key
        const totalPlaces = Object.values(pd.valueCounts).reduce((s, n) => s + n, 0);
        const badgeVal = sortMode === 'vals' ? totalPlaces : pd.totalWithValue;
        const badgeTip = sortMode === 'vals' ? `${totalPlaces} total places across all values` : `${pd.totalWithValue} features with this property`;

        const metaEl = document.createElement('span');
        metaEl.className = 'prop-meta';
        metaEl.innerHTML = `<span class="prop-count-badge" title="${badgeTip}">${badgeVal}</span><span class="prop-arrow">▶</span>`;
        metaEl.querySelector('.prop-arrow').addEventListener('click', () => { openPropKey = (openPropKey === key) ? null : key; renderSidebar(); });

        propEl.appendChild(cbWrap);
        propEl.appendChild(nameBtn);
        propEl.appendChild(metaEl);

        const valuesEl = document.createElement('div');
        valuesEl.className = 'values-panel' + (isOpen ? ' open' : '');

        sortedValues.forEach(([val, count]) => {
            const vi = document.createElement('div');
            let viState = 0;
            if (activeFilter && activeFilter.prop === key && activeFilter.value === val)
                viState = activeFilter.mode === 'highlight' ? 1 : activeFilter.mode === 'filter' ? 2 : activeFilter.mode === 'exclude' ? 3 : 0;
            vi.className = 'value-item' + (viState === 1 ? ' state-highlight' : viState === 2 ? ' state-filter' : viState === 3 ? ' state-exclude' : '');
            vi.innerHTML = `<span class="value-text">${escHtml(val)}</span><span class="value-count">${count}</span>`;
            vi.addEventListener('click', e => { e.stopPropagation(); sidebarValueClick(key, val); });
            valuesEl.appendChild(vi);
        });

        list.appendChild(propEl);
        list.appendChild(valuesEl);
    });
}

// ── VALUE CLICK: 4-STATE CYCLE ──
// none → highlight (green) → filter/hide-others (yellow) → exclude/hide-these (red) → none
function sidebarValueClick(key, val) {
    const isSame = activeFilter && activeFilter.prop === key && activeFilter.value === val;
    const currentMode = isSame ? activeFilter.mode : null;
    clearAllFilterStates();

    if (!isSame || currentMode === null) {
        activeFilter = { prop: key, value: val, mode: 'highlight' };
        doHighlight(key, val);
    } else if (currentMode === 'highlight') {
        activeFilter = { prop: key, value: val, mode: 'filter' };
        doFilterSelect(key, val);
    } else if (currentMode === 'filter') {
        activeFilter = { prop: key, value: val, mode: 'exclude' };
        doExclude(key, val);
    } else {
        // was 'exclude' → clear
        activeFilter = null;
    }
    renderSidebar();
    refreshFrozenPopup();
    pushHashState();
}

// ── HIGHLIGHT / FILTER ──
function doHighlight(key, val) {
    allFeatures.forEach(f => {
        if (String(f.properties[key]) === String(val)) {
            const id = f.properties._gvid;
            map.setFeatureState({ source: 'geojson-data', id }, { highlighted: true });
            highlightedIds.add(id);
        }
    });
}

function doFilterSelect(key, val) {
    allFeatures.forEach(f => {
        const id = f.properties._gvid;
        const matches = String(f.properties[key]) === String(val);
        const geomHidden = geomTypeOf(f) ? !geomVisible[geomTypeOf(f)] : false;
        if (matches) {
            map.setFeatureState({ source: 'geojson-data', id }, { highlighted: false, filtered: true, hidden: geomHidden });
            selectedIds.add(id);
        } else {
            map.setFeatureState({ source: 'geojson-data', id }, { hidden: true });
            hiddenIds.add(id);
        }
    });
    highlightedIds.clear();
    updateSelectionBar();
}

// Hide the matching features, show everything else
function doExclude(key, val) {
    allFeatures.forEach(f => {
        const id = f.properties._gvid;
        const matches = String(f.properties[key]) === String(val);
        const geomHidden = geomTypeOf(f) ? !geomVisible[geomTypeOf(f)] : false;
        if (matches) {
            map.setFeatureState({ source: 'geojson-data', id }, { filtered: false, highlighted: false, hidden: true });
            hiddenIds.add(id);
        } else {
            // Restore previously hidden (from a filter state) features
            map.setFeatureState({ source: 'geojson-data', id }, { hidden: geomHidden, filtered: false });
        }
    });
    // Remove any selected features that are now hidden
    hiddenIds.forEach(id => { selectedIds.delete(id); map.setFeatureState({ source: 'geojson-data', id }, { selected: false }); });
    updateSelectionBar();
}

function clearAllFilterStates() {
    highlightedIds.forEach(id => map.setFeatureState({ source: 'geojson-data', id }, { highlighted: false }));
    highlightedIds.clear();
    if (activeFilter && (activeFilter.mode === 'filter' || activeFilter.mode === 'exclude')) {
        const { prop, value } = activeFilter;
        hiddenIds.forEach(id => {
            const f = allFeatures[id];
            const geomHidden = f && geomTypeOf(f) ? !geomVisible[geomTypeOf(f)] : false;
            map.setFeatureState({ source: 'geojson-data', id }, { hidden: geomHidden, filtered: false });
        });
        hiddenIds.clear();
        if (activeFilter.mode === 'filter') {
            allFeatures.forEach(f => {
                if (String(f.properties[prop]) === String(value)) {
                    const id = f.properties._gvid;
                    map.setFeatureState({ source: 'geojson-data', id }, { filtered: false });
                    selectedIds.delete(id);
                }
            });
        }
        updateSelectionBar();
    }
}

// ── HOVER POPUP + HOVER STATE ──
let hoveredMapId = null;   // tracks which feature has 'hovered' feature-state set

function setHoveredFeature(id) {
    if (id === hoveredMapId) return;
    // Clear old
    if (hoveredMapId !== null) {
        map.setFeatureState({ source: 'geojson-data', id: hoveredMapId }, { hovered: false });
    }
    hoveredMapId = id;
    if (id !== null) {
        map.setFeatureState({ source: 'geojson-data', id }, { hovered: true });
    }
}

function onMouseMove(e) {
    const f = e.features[0];
    if (!f) return;
    const fid = f.properties._gvid;

    // Skip hidden features entirely
    if (hiddenIds.has(fid)) {
        map.getCanvas().style.cursor = '';
        setHoveredFeature(null);
        lastHoveredId = null;
        hoverPopup.remove();
        return;
    }

    // Always show pointer and apply hover tint
    map.getCanvas().style.cursor = 'pointer';
    setHoveredFeature(fid);

    // If a popup is pinned on a DIFFERENT feature, close it and switch to hover mode
    if (frozenPopup && frozenFeatureProps && frozenFeatureProps._gvid !== fid) {
        frozenPopup.remove(); frozenPopup = null;
        // Keep the feature selected — just unpin the popup
        frozenFeatureProps = null; popupRowStates = {};
    }

    // Show hover popup when no frozen popup
    if (!frozenPopup) {
        if (fid !== lastHoveredId) {
            lastHoveredId = fid;
            const props = cleanProps(f.properties);
            const entries = Object.entries(props).filter(([, v]) => v !== null && v !== undefined && v !== '');
            if (!entries.length) { hoverPopup.remove(); return; }
            const rows = entries.map(([k, v]) =>
                `<div class="popup-row no-click"><span class="popup-key">${escHtml(k)}</span><span class="popup-val">${escHtml(String(v))}</span></div>`
            ).join('');
            hoverPopup.setHTML(`<div class="popup-inner">${rows}</div><div class="popup-hint">Click to pin &amp; interact</div>`);
            hoverPopup.addTo(map);
        }
        hoverPopup.setLngLat(e.lngLat);
    }
}

function onMouseLeave() {
    map.getCanvas().style.cursor = '';
    setHoveredFeature(null);
    lastHoveredId = null;
    hoverPopup.remove();
}

// ── CLICK: PIN POPUP + SELECT ──
function onFeatureClick(e) {
    e.preventDefault();
    const f = e.features[0]; if (!f) return;
    const id = f.id ?? f.properties._gvid;
    if (hiddenIds.has(f.properties._gvid)) return;

    // Always dismiss the frozen popup on any click
    if (frozenPopup) { frozenPopup.remove(); frozenPopup = null; }
    // Clear hover tint — selected state will take over visually
    setHoveredFeature(null);

    // Clicking the same feature that was pinned: deselect and stop
    if (frozenFeatureProps && frozenFeatureProps._gvid === f.properties._gvid) {
        frozenFeatureProps = null; popupRowStates = {};
        if (selectedIds.has(id)) { selectedIds.delete(id); map.setFeatureState({ source: 'geojson-data', id }, { selected: false }); }
        updateSelectionBar();
        return;
    }

    // New feature: select it and pin a new popup
    frozenFeatureProps = null; popupRowStates = {};
    if (!selectedIds.has(id)) {
        selectedIds.add(id);
        map.setFeatureState({ source: 'geojson-data', id }, { selected: true });
        updateSelectionBar();
    }

    frozenFeatureProps = f.properties;
    hoverPopup.remove(); lastHoveredId = null;
    frozenPopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 12 });
    frozenPopup.setLngLat(e.lngLat).setHTML(buildFrozenHTML()).addTo(map);
    setTimeout(() => attachFrozenEvents(), 50);
}

function cleanProps(raw) { const p = { ...raw }; delete p._gvid; return p; }

function buildFrozenHTML() {
    const props = cleanProps(frozenFeatureProps || {});
    const entries = Object.entries(props).filter(([, v]) => v !== null && v !== undefined && v !== '');
    const rows = entries.map(([k, v]) => {
        const st = popupRowStates[k] || 0;
        const cls = st === 1 ? ' state-highlight' : st === 2 ? ' state-filter' : st === 3 ? ' state-exclude' : '';
        return `<div class="popup-row${cls}" data-key="${escHtml(k)}" data-val="${escHtml(String(v))}">
            <span class="popup-key">${escHtml(k)}</span>
            <span class="popup-val">${escHtml(String(v))}</span>
        </div>`;
    }).join('');
    return `
        <div class="popup-header">
            <span class="popup-header-label">📌 Pinned Feature</span>
            <button class="popup-close-btn" id="popup-close-x">✕</button>
        </div>
        <div class="popup-inner">${rows}</div>
        <div class="popup-hint">1× highlight · 2× hide others · 3× hide these · 4× clear</div>`;
}

function attachFrozenEvents() {
    const el = frozenPopup && frozenPopup.getElement(); if (!el) return;
    el.querySelector('#popup-close-x')?.addEventListener('click', () => {
        if (frozenPopup) { frozenPopup.remove(); frozenPopup = null; frozenFeatureProps = null; popupRowStates = {}; }
    });
    el.querySelectorAll('.popup-row').forEach(row => {
        row.addEventListener('click', ev => {
            ev.stopPropagation();
            const key = row.dataset.key, val = row.dataset.val;
            const next = ((popupRowStates[key] || 0) + 1) % 4;
            popupRowStates[key] = next;
            clearAllFilterStates();
            if (next === 1) { activeFilter = { prop: key, value: val, mode: 'highlight' }; doHighlight(key, val); }
            else if (next === 2) { activeFilter = { prop: key, value: val, mode: 'filter' }; doFilterSelect(key, val); }
            else if (next === 3) { activeFilter = { prop: key, value: val, mode: 'exclude' }; doExclude(key, val); }
            else { activeFilter = null; }
            renderSidebar();
            refreshFrozenPopup();
        });
    });
}

function refreshFrozenPopup() {
    if (!frozenPopup || !frozenFeatureProps) return;
    frozenPopup.setHTML(buildFrozenHTML());
    setTimeout(() => attachFrozenEvents(), 50);
}

// ── SORT BUTTONS ──
function setSortMode(mode) {
    sortMode = mode;
    document.getElementById('sort-keys-btn').classList.toggle('active', mode === 'keys');
    document.getElementById('sort-vals-btn').classList.toggle('active', mode === 'vals');
    document.getElementById('sort-alpha-btn').classList.toggle('active', mode === 'alpha');
    renderSidebar();
}
document.getElementById('sort-keys-btn').addEventListener('click', () => setSortMode('keys'));
document.getElementById('sort-vals-btn').addEventListener('click', () => setSortMode('vals'));
document.getElementById('sort-alpha-btn').addEventListener('click', () => setSortMode('alpha'));
document.getElementById('prop-search').addEventListener('input', () => renderSidebar());

// ── SELECTION BAR ──
function updateSelectionBar() {
    const totalFeatures = allFeatures.length;
    const numHidden = hiddenIds.size;
    const numVisible = totalFeatures - numHidden;
    const numSelected = selectedIds.size;
    const dataLoaded = totalFeatures > 0;

    document.getElementById('sel-num').textContent = numSelected.toLocaleString();
    document.getElementById('vis-num').textContent = numVisible.toLocaleString();
    document.getElementById('hid-num').textContent = numHidden.toLocaleString();

    // Bar is always visible once data is loaded
    document.getElementById('selection-bar').classList.toggle('visible', dataLoaded);
    // Reposition sidebar now that bar height is known
    requestAnimationFrame(positionSidebar);

    // Save Visible only useful when something is hidden
    document.getElementById('save-visible-btn').style.visibility = numHidden > 0 ? 'visible' : 'hidden';

    // Sidebar filter tag (below label hint)
    const sidebarTagRow = document.getElementById('sidebar-filter-tag-row');
    const sidebarTag = document.getElementById('sidebar-filter-tag');
    if (activeFilter) {
        const modeIcons = { highlight: '●', filter: '◑', exclude: '✕' };
        document.getElementById('sidebar-filter-tag-icon').textContent = modeIcons[activeFilter.mode] || '';
        document.getElementById('sidebar-filter-tag-text').textContent = `${activeFilter.prop}: ${activeFilter.value}`;
        sidebarTag.className = `mode-${activeFilter.mode}`;
        sidebarTag.id = 'sidebar-filter-tag';
        sidebarTagRow.classList.add('visible');
    } else {
        sidebarTagRow.classList.remove('visible');
        sidebarTag.className = '';
        sidebarTag.id = 'sidebar-filter-tag';
    }
}

document.getElementById('clear-btn').addEventListener('click', () => {
    selectedIds.forEach(id => map.setFeatureState({ source: 'geojson-data', id }, { selected: false, filtered: false }));
    selectedIds.clear();
    clearAllFilterStates();
    activeFilter = null; popupRowStates = {};
    hiddenIds.forEach(id => {
        const f = allFeatures[id];
        const geomHidden = f && geomTypeOf(f) ? !geomVisible[geomTypeOf(f)] : false;
        map.setFeatureState({ source: 'geojson-data', id }, { hidden: geomHidden });
    });
    hiddenIds.clear();
    updateSelectionBar();
    renderSidebar();
    refreshFrozenPopup();
    pushHashState();
});

// ── RESET ALL ──
function resetAll() {
    if (allFeatures.length > 0 || tileSelected.size > 0) {
        if (!confirm('Clear all loaded data, selections, and filters?')) return;
    }

    // Clear GeoJSON layer
    if (map.getSource('geojson-data')) {
        map.getSource('geojson-data').setData({ type: 'FeatureCollection', features: [] });
    }
    allFeatures = [];
    selectedIds.clear(); highlightedIds.clear(); hiddenIds.clear();
    activeFilter = null; popupRowStates = {}; openPropKey = null; labelProps.clear();
    lastHoveredId = null; hoveredMapId = null;

    // Clear tile selection overlays
    tileSelected.clear();
    if (map.getSource('tile-select-overlay')) {
        map.getSource('tile-select-overlay').setData({ type: 'FeatureCollection', features: [] });
    }
    if (map.getSource('tile-hover-overlay')) {
        map.getSource('tile-hover-overlay').setData({ type: 'FeatureCollection', features: [] });
    }
    tileHoveredLayer = null; tileHoveredSource = null;
    tileHoveredSourceLayer = null; tileHoveredId = null;

    // Clear popups
    if (frozenPopup) { frozenPopup.remove(); frozenPopup = null; frozenFeatureProps = null; }
    hoverPopup.remove();

    // Clear source tracking
    currentDataUrl = null; currentSourceName = '';
    document.getElementById('share-btn').classList.remove('visible');

    // Reset sidebar
    propData = {};
    document.getElementById('props-list').innerHTML =
        '<div id="sidebar-empty">Upload a GeoJSON file or click map features to get started.</div>';
    document.getElementById('sidebar-subtitle').textContent = 'No file loaded';
    updateLabelHint();

    // Reset URL hash
    history.replaceState(null, '', location.pathname + location.search);

    // Reset file input so same file can be re-loaded
    document.getElementById('file-input').value = '';

    updateSelectionBar();
    updateTileSelectionRow();
    renderSidebar();
}
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Build a descriptive filename for saved GeoJSON
// e.g. "parks-sport_tennis-selected.geojson" or "parks-visible.geojson"
function buildSaveFilename(suffix) {
    const parts = [];
    if (currentSourceName) parts.push(currentSourceName);
    if (activeFilter) {
        const sanitize = s => String(s).replace(/[\s/\\]+/g, '_').replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 40);
        const modeLabel = { highlight: 'hl', filter: 'show', exclude: 'hide' };
        parts.push(`${modeLabel[activeFilter.mode] || activeFilter.mode}_${sanitize(activeFilter.prop)}_${sanitize(activeFilter.value)}`);
    }
    parts.push(suffix);
    return parts.join('-') + '.geojson';
}

document.getElementById('save-visible-btn').addEventListener('click', () => {
    const features = allFeatures
        .filter(f => !hiddenIds.has(f.properties._gvid))
        .map(f => { const p = { ...f.properties }; delete p._gvid; return { ...f, id: undefined, properties: p }; });
    const blob = new Blob([JSON.stringify({ type: 'FeatureCollection', features }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = buildSaveFilename('visible'); a.click();
    URL.revokeObjectURL(url);
});

document.getElementById('save-btn').addEventListener('click', () => {
    const features = allFeatures
        .filter(f => selectedIds.has(f.properties._gvid))
        .map(f => { const p = { ...f.properties }; delete p._gvid; return { ...f, id: undefined, properties: p }; });
    const blob = new Blob([JSON.stringify({ type: 'FeatureCollection', features }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = buildSaveFilename('selected'); a.click();
    URL.revokeObjectURL(url);
});
